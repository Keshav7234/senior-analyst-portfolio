version: '3.8'

services:
  # C++ Backend
  cpp-backend:
    build:
      context: .
      dockerfile: cpp-backend/Dockerfile
    container_name: portfolio-cpp-backend
    ports:
      - "8080:8080"
    environment:
      - DATABASE_PATH=/app/portfolio.db
    volumes:
      - portfolio_db:/app
    networks:
      - portfolio-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Java Backend (Optional)
  java-backend:
    image: maven:3.8-openjdk-17
    container_name: portfolio-java-backend
    working_dir: /app/backend
    volumes:
      - ./backend:/app/backend
    ports:
      - "8081:8080"
    command: mvn clean spring-boot:run
    networks:
      - portfolio-network
    environment:
      - JAVA_OPTS=-Xmx512m -Xms256m
    restart: unless-stopped

  # Frontend (Nginx)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: portfolio-frontend
    ports:
      - "3000:3000"
    depends_on:
      - cpp-backend
    networks:
      - portfolio-network
    restart: unless-stopped
    environment:
      - API_URL=http://cpp-backend:8080

  # Nginx Reverse Proxy
  reverse-proxy:
    image: nginx:latest
    container_name: portfolio-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - cpp-backend
      - frontend
    networks:
      - portfolio-network
    restart: unless-stopped

networks:
  portfolio-network:
    driver: bridge

volumes:
  portfolio_db:
    driver: local
